        jobId:
          type: integer
        name:
          type: string
        role:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, jobId, name, role, createdAt]

    CreateJobContactInput:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      required: [name, role]

    UpdateJobContactInput:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true

    TimeEntry:
      type: object
