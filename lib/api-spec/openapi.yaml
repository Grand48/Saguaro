        quantity:
          type: integer
        notes:
          type: string
          nullable: true
        status:
          type: string
          enum: [needed, reserved, on_site, returned]

    JobForm:
      type: object
      properties:
        id:
          type: integer
        jobId:
          type: integer
        formType:
          type: string
          enum: [job_completion, quality_control, custom]
        status:
          type: string
          enum: [draft, signed]
        fields:
          type: string
          nullable: true
          description: JSON-encoded field values
        customFormName:
          type: string
          nullable: true
          description: File name of the uploaded custom form
        customFormData:
          type: string
          nullable: true
          description: Base64-encoded PDF or image of the uploaded form
        signatureName:
          type: string
          nullable: true
        signatureData:
          type: string
          nullable: true
          description: SVG path data for the hand-drawn signature
        signedByCrewId:
          type: integer
          nullable: true
        signedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        signedByCrew:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/CrewMember"
      required:
        - id
        - jobId
        - formType
        - status
        - createdAt

    CreateJobFormInput:
      type: object
      properties:
        formType:
          type: string
          enum: [job_completion, quality_control, custom]
        customFormName:
          type: string
          description: File name of uploaded form (required when formType is custom)
        customFormData:
          type: string
          description: Base64-encoded PDF or image data URI (required when formType is custom)
      required:
        - formType

    SubmitJobFormInput:
      type: object
      properties:
        fields:
          type: object
          additionalProperties:
            type: string
        signatureName:
          type: string
        signatureData:
          type: string
        signedByCrewId:
          type: integer

    EmployeeRequest:
      type: object
      properties:
        id:
          type: integer
        crewId:
          type: integer
        category:
          type: string
          enum: [tool, equipment, supply, other]
        title:
          type: string
        description:
          type: string
          nullable: true
        quantity:
          type: integer
        priority:
          type: string
          enum: [low, normal, urgent]
        status:
          type: string
          enum: [pending, fulfilled]
        fulfilledAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        crew:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/CrewMember"
      required:
        - id
        - crewId
        - category
        - title
        - quantity
        - priority
        - status
        - createdAt

