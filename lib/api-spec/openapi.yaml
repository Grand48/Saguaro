openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Crew Scheduler API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: crew
    description: Crew member operations
  - name: locations
    description: Location operations
  - name: jobs
    description: Job operations
  - name: tasks
    description: Job task operations
  - name: messages
    description: Group messaging operations
  - name: photos
    description: Photo sharing operations
  - name: equipment
    description: Job equipment requirement operations
  - name: crew-documents
    description: Crew member training documents and certificates
  - name: job-contacts
    description: Contacts associated with a job
  - name: time-entries
    description: Employee clock-in/clock-out time tracking
  - name: notifications
    description: Universal crew notifications
  - name: time-off
    description: Time-off request operations
  - name: side-quests
    description: Optional unscheduled tasks that crew can claim when unlocked by admin
  - name: employee-requests
    description: Employee requests for tools, equipment, and supplies
  - name: job-forms
    description: Electronic forms for job completion and quality control, with digital signatures
  - name: dashboard
    description: Dashboard summary operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── CREW ────────────────────────────────────────────────────────────────────
  /crew:
    get:
      operationId: listCrew
      tags: [crew]
      summary: List all crew members
      responses:
        "200":
          description: List of crew members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CrewMember"
    post:
      operationId: createCrewMember
      tags: [crew]
      summary: Create a crew member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCrewMemberInput"
      responses:
        "201":
          description: Created crew member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrewMember"

  /crew/{id}:
    get:
      operationId: getCrewMember
      tags: [crew]
      summary: Get a crew member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Crew member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrewMember"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateCrewMember
      tags: [crew]
      summary: Update a crew member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCrewMemberInput"
      responses:
        "200":
          description: Updated crew member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrewMember"
    delete:
      operationId: deleteCrewMember
      tags: [crew]
      summary: Delete a crew member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── LOCATIONS ───────────────────────────────────────────────────────────────
  /locations:
    get:
      operationId: listLocations
      tags: [locations]
      summary: List all locations with their associated jobs
      responses:
        "200":
          description: List of locations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LocationWithJobs"
    post:
      operationId: createLocation
      tags: [locations]
      summary: Create a location
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLocationInput"
      responses:
        "201":
          description: Created location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Location"

  /locations/{id}:
    get:
      operationId: getLocation
      tags: [locations]
      summary: Get a location with its linked jobs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Location detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateLocation
      tags: [locations]
      summary: Update a location
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLocationInput"
      responses:
        "200":
          description: Updated location
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Location"
    delete:
      operationId: deleteLocation
      tags: [locations]
      summary: Delete a location
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── JOBS ────────────────────────────────────────────────────────────────────
  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List all jobs
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobInput"
      responses:
        "201":
          description: Created job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get a job with its assigned crew and tasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateJob
      tags: [jobs]
      summary: Update a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobInput"
      responses:
        "200":
          description: Updated job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    delete:
      operationId: deleteJob
      tags: [jobs]
      summary: Delete a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /jobs/{id}/crew:
    get:
      operationId: getJobCrew
      tags: [jobs]
      summary: Get crew assigned to a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Assigned crew
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CrewMember"
    post:
      operationId: assignCrewToJob
      tags: [jobs]
      summary: Assign crew members to a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignCrewInput"
      responses:
        "200":
          description: Updated crew list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CrewMember"

  /jobs/{id}/crew/{crewId}:
    delete:
      operationId: removeCrewFromJob
      tags: [jobs]
      summary: Remove a crew member from a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: crewId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  # ─── TASKS ───────────────────────────────────────────────────────────────────
  /jobs/{id}/tasks:
    get:
      operationId: listJobTasks
      tags: [tasks]
      summary: List tasks for a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tasks list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task for a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskInput"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    put:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskInput"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── MESSAGES ────────────────────────────────────────────────────────────────
  /jobs/{id}/messages:
    get:
      operationId: listJobMessages
      tags: [messages]
      summary: List messages for a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Messages list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message in a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageInput"
      responses:
        "201":
          description: Sent message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /messages/{id}:
    delete:
      operationId: deleteMessage
      tags: [messages]
      summary: Delete a message
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── PHOTOS ──────────────────────────────────────────────────────────────────
  /jobs/{id}/photos:
    get:
      operationId: listJobPhotos
      tags: [photos]
      summary: List photos for a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Photos list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"
    post:
      operationId: uploadPhoto
      tags: [photos]
      summary: Upload a photo to a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadPhotoInput"
      responses:
        "201":
          description: Uploaded photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"

  /photos/{id}:
    delete:
      operationId: deletePhoto
      tags: [photos]
      summary: Delete a photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── EQUIPMENT ───────────────────────────────────────────────────────────────
  /jobs/{id}/equipment:
    get:
      operationId: listJobEquipment
      tags: [equipment]
      summary: List equipment requirements for a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of equipment items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Equipment"
    post:
      operationId: createEquipment
      tags: [equipment]
      summary: Add an equipment requirement to a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEquipmentInput"
      responses:
        "201":
          description: Created equipment item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Equipment"

  /equipment/{id}:
    put:
      operationId: updateEquipment
      tags: [equipment]
      summary: Update an equipment item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEquipmentInput"
      responses:
        "200":
          description: Updated equipment item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Equipment"
    delete:
      operationId: deleteEquipment
      tags: [equipment]
      summary: Delete an equipment item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── JOB CONTACTS ────────────────────────────────────────────────────────────
  /jobs/{jobId}/contacts:
    get:
      operationId: listJobContacts
      tags: [job-contacts]
      summary: List contacts for a job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobContact"
    post:
      operationId: createJobContact
      tags: [job-contacts]
      summary: Add a contact to a job
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobContactInput"
      responses:
        "201":
          description: Created contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobContact"

  /job-contacts/{id}:
    put:
      operationId: updateJobContact
      tags: [job-contacts]
      summary: Update a job contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJobContactInput"
      responses:
        "200":
          description: Updated contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobContact"
    delete:
      operationId: deleteJobContact
      tags: [job-contacts]
      summary: Delete a job contact
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── TIME ENTRIES ────────────────────────────────────────────────────────────
  /time-entries:
    get:
      operationId: listTimeEntries
      tags: [time-entries]
      summary: List all time entries (admin view)
      responses:
        "200":
          description: List of time entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeEntry"

  /time-entries/active:
    get:
      operationId: listActiveTimeEntries
      tags: [time-entries]
      summary: List all currently clocked-in crew
      responses:
        "200":
          description: Active sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeEntry"

  /time-entries/clock-in:
    post:
      operationId: clockIn
      tags: [time-entries]
      summary: Clock in a crew member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClockInInput"
      responses:
        "201":
          description: Time entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeEntry"
        "409":
          description: Already clocked in

  /time-entries/clock-out:
    post:
      operationId: clockOut
      tags: [time-entries]
      summary: Clock out a crew member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClockOutInput"
      responses:
        "200":
          description: Time entry closed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeEntry"

  /time-entries/crew/{crewId}:
    get:
      operationId: listCrewTimeEntries
      tags: [time-entries]
      summary: List time entries for a crew member
      parameters:
        - name: crewId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Crew time entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeEntry"

  /time-entries/crew/{crewId}/active:
    get:
      operationId: getActiveTimeEntry
      tags: [time-entries]
      summary: Get active (clocked-in) session for a crew member
      parameters:
        - name: crewId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Active session or null
          content:
            application/json:
              schema:
                nullable: true
                oneOf:
                  - $ref: "#/components/schemas/TimeEntry"
                  - type: "null"

  /time-entries/{id}:
    delete:
      operationId: deleteTimeEntry
      tags: [time-entries]
      summary: Delete a time entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── NOTIFICATIONS ───────────────────────────────────────────────────────────
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List all notifications with read counts (admin view)
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NotificationWithStats"
    post:
      operationId: createNotification
      tags: [notifications]
      summary: Broadcast a notification to all crew
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNotificationInput"
      responses:
        "201":
          description: Created notification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /notifications/{id}:
    delete:
      operationId: deleteNotification
      tags: [notifications]
      summary: Delete a notification
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read for a crew member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                crewId:
                  type: integer
              required: [crewId]
      responses:
        "200":
          description: Marked as read

  /notifications/crew/{crewId}:
    get:
      operationId: getCrewNotifications
      tags: [notifications]
      summary: Get notifications for a crew member with read status
      parameters:
        - name: crewId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of notifications with read status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NotificationWithReadStatus"

  /notifications/crew/{crewId}/unread-count:
    get:
      operationId: getCrewUnreadCount
      tags: [notifications]
      summary: Get unread notification count for a crew member
      parameters:
        - name: crewId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  unread:
                    type: integer
                required: [unread]

  # ─── CREW DOCUMENTS ──────────────────────────────────────────────────────────
  /crew/{crewId}/documents:
    get:
      operationId: listCrewDocuments
      tags: [crew-documents]
      summary: List documents for a crew member (metadata only, no file data)
      parameters:
        - name: crewId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CrewDocument"
    post:
      operationId: uploadCrewDocument
      tags: [crew-documents]
      summary: Upload a document for a crew member
      parameters:
        - name: crewId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadCrewDocumentInput"
      responses:
        "201":
          description: Uploaded document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrewDocument"

  /crew-documents/{id}:
    delete:
      operationId: deleteCrewDocument
      tags: [crew-documents]
      summary: Delete a crew document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /crew-documents/{id}/download:
    get:
      operationId: downloadCrewDocument
      tags: [crew-documents]
      summary: Download the file for a crew document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: File binary

  # ─── TIME OFF ────────────────────────────────────────────────────────────────
  /time-off:
    get:
      operationId: listTimeOffRequests
      tags: [time-off]
      summary: List all time-off requests with crew info
      responses:
        "200":
          description: List of time-off requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeOffRequestWithCrew"
    post:
      operationId: createTimeOffRequest
      tags: [time-off]
      summary: Submit a time-off request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTimeOffInput"
      responses:
        "201":
          description: Created request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeOffRequest"

  /time-off/crew/{crewId}:
    get:
      operationId: listCrewTimeOff
      tags: [time-off]
      summary: List time-off requests for a specific crew member
      parameters:
        - name: crewId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of time-off requests for that crew member
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeOffRequestWithCrew"

  /time-off/{id}:
    put:
      operationId: updateTimeOffRequest
      tags: [time-off]
      summary: Update a time-off request (approve/deny or edit)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTimeOffInput"
      responses:
        "200":
          description: Updated request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeOffRequest"
    delete:
      operationId: deleteTimeOffRequest
      tags: [time-off]
      summary: Delete a time-off request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── DASHBOARD ───────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/upcoming-jobs:
    get:
      operationId: getUpcomingJobs
      tags: [dashboard]
      summary: Get upcoming jobs in the next 7 days
      responses:
        "200":
          description: Upcoming jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"

  /jobs/{id}/forms:
    get:
      operationId: listJobForms
      tags: [job-forms]
      summary: List all forms for a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of forms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobForm"
    post:
      operationId: createJobForm
      tags: [job-forms]
      summary: Start a new form for a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobFormInput"
      responses:
        "201":
          description: Created form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobForm"

  /jobs/{id}/forms/{formId}:
    patch:
      operationId: submitJobForm
      tags: [job-forms]
      summary: Submit or update a form (with electronic signature)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: formId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitJobFormInput"
      responses:
        "200":
          description: Updated form
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobForm"
    delete:
      operationId: deleteJobForm
      tags: [job-forms]
      summary: Delete a form
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: formId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /employee-requests:
    get:
      operationId: listEmployeeRequests
      tags: [employee-requests]
      summary: List employee requests (filter by crewId or status)
      parameters:
        - name: crewId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, fulfilled]
      responses:
        "200":
          description: List of requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeRequest"
    post:
      operationId: createEmployeeRequest
      tags: [employee-requests]
      summary: Submit a new employee request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeRequestInput"
      responses:
        "201":
          description: Created request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeRequest"

  /employee-requests/{id}/fulfill:
    patch:
      operationId: fulfillEmployeeRequest
      tags: [employee-requests]
      summary: Mark a request as fulfilled
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Fulfilled request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeRequest"

  /employee-requests/{id}:
    delete:
      operationId: deleteEmployeeRequest
      tags: [employee-requests]
      summary: Delete (remove) a request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /side-quests:
    get:
      operationId: listSideQuests
      tags: [side-quests]
      summary: List all side quests
      responses:
        "200":
          description: List of side quests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SideQuest"
    post:
      operationId: createSideQuest
      tags: [side-quests]
      summary: Create a new side quest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSideQuestInput"
      responses:
        "201":
          description: Created side quest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SideQuest"

  /side-quests/{id}:
    patch:
      operationId: updateSideQuest
      tags: [side-quests]
      summary: Update a side quest (lock/unlock, claim, complete)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSideQuestInput"
      responses:
        "200":
          description: Updated side quest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SideQuest"
    delete:
      operationId: deleteSideQuest
      tags: [side-quests]
      summary: Delete a side quest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    JobContact:
