        id:
          type: integer
        crewId:
          type: integer
        crewName:
          type: string
          nullable: true
        crewRole:
          type: string
          nullable: true
        jobId:
          type: integer
          nullable: true
        jobTitle:
          type: string
          nullable: true
        clockIn:
          type: string
          format: date-time
        clockOut:
          type: string
          format: date-time
